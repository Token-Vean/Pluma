# =============================================================================
# Catálogo de tipos documentales
# -----------------------------------------------------------------------------
# Se usa para una pre-pasada ligera del LLM antes de la extracción principal.
# La identificación del tipo permite ajustar dinámicamente las instrucciones
# de extracción de ciertos campos (título, alcance, productor) para obtener
# resultados más precisos que los de un prompt genérico.
#
# Cada archivo puede ampliar este catálogo con tipos propios sin tocar código:
# basta con añadir entradas a este fichero respetando la estructura.
#
# Estructura:
#   clave             identificador interno (snake_case)
#   nombre            denominación normalizada
#   familia           administrativo | historico | judicial | notarial |
#                     eclesiastico | personal | grafico | contable
#   descripcion       qué es (1-2 frases)
#   rasgos            pistas de identificación para el LLM
#   instrucciones     ajustes de extracción por campo (opcional)
# =============================================================================

version: "1.0"
idioma: es

tipos:

  # ---------- Administrativo contemporáneo ---------------------------------
  - clave: oficio
    nombre: Oficio
    familia: administrativo
    descripcion: |
      Comunicación escrita formal entre órganos de la Administración o
      entre la Administración y particulares, con estructura
      estandarizada: remitente, destinatario, asunto, cuerpo y firma.
    rasgos:
      - Cabecera con membrete institucional
      - Campos "De:" / "A:" / "Asunto:" / "Nº"
      - Fórmula de cierre ("Lo que se comunica...")
      - Firma de autoridad con cargo
    instrucciones:
      titulo: |
        Formato recomendado: "Oficio de [órgano emisor] a [destinatario]
        sobre [asunto]". Usa el asunto literal entre comillas si es breve
        y descriptivo.
      alcance: |
        Resume la resolución o comunicación principal, condiciones
        anexas y referencias a expedientes mencionados.

  - clave: expediente_administrativo
    nombre: Expediente administrativo
    familia: administrativo
    descripcion: |
      Conjunto ordenado de documentos y actuaciones que sirven de
      antecedente y fundamento a la resolución administrativa, así como
      las diligencias encaminadas a ejecutarla.
    rasgos:
      - Carátula o índice con numeración de documentos
      - Diversidad de tipos documentales dentro
      - Referencias cruzadas entre piezas
      - Cronología consecutiva
    instrucciones:
      titulo: |
        Fórmula: "Expediente de [materia] relativo a [objeto/persona]".
      nivel_descripcion: |
        Un expediente es, por defecto, "unidad_documental_compuesta".

  - clave: resolucion
    nombre: Resolución
    familia: administrativo
    descripcion: |
      Acto administrativo unilateral que pone fin a un procedimiento,
      declarando derechos, imponiendo obligaciones o resolviendo
      solicitudes.
    rasgos:
      - Encabezado "RESOLUCIÓN" o "RESUELVO"
      - Fundamentos de derecho numerados
      - Parte dispositiva con acuerdos
      - Pie de recurso
    instrucciones:
      titulo: |
        Fórmula: "Resolución de [órgano] por la que se [verbo resolutivo]
        [objeto]". Verbos típicos: aprueba, concede, deniega, autoriza.

  - clave: memoria
    nombre: Memoria
    familia: administrativo
    descripcion: |
      Documento que da cuenta detallada de la actividad, gestión o
      resultados de un organismo o proyecto durante un periodo.
    rasgos:
      - Extensión considerable, estructura por capítulos o apartados
      - Datos cuantitativos, tablas, estadísticas
      - Periodo de referencia explícito (anual, bianual)
    instrucciones:
      titulo: |
        Fórmula: "Memoria [anual/de actividades] de [órgano] · [periodo]".

  - clave: informe
    nombre: Informe
    familia: administrativo
    descripcion: |
      Documento técnico o valorativo que expone hechos, análisis y,
      en su caso, conclusiones o propuestas sobre una materia.
    rasgos:
      - Estructura: antecedentes, análisis, conclusiones
      - Firma de técnico o comisión
      - Frecuentemente destinado a servir de base a otra resolución

  # ---------- Actas y órganos colegiados -----------------------------------
  - clave: acta_sesion
    nombre: Acta de sesión
    familia: administrativo
    descripcion: |
      Relación escrita de lo tratado y acordado en una reunión de un
      órgano colegiado (pleno, junta, consejo, comisión).
    rasgos:
      - Fórmula "Reunidos los señores..." o similar
      - Lista de asistentes con cargos
      - Orden del día numerado
      - Acuerdos con numeración o epígrafes
      - Firma de secretario con visto bueno del presidente
    instrucciones:
      titulo: |
        Fórmula: "Acta de la sesión [ordinaria/extraordinaria] de
        [órgano] de [fecha]". Si el acta es de un pleno municipal,
        incluye el ayuntamiento.
      nombre_productor: |
        El productor es el órgano colegiado completo, no la persona que
        firma. Ejemplo: "Pleno del Ayuntamiento de Toledo", no
        "Secretario municipal".

  # ---------- Correspondencia ---------------------------------------------
  - clave: carta
    nombre: Carta
    familia: personal
    descripcion: |
      Comunicación escrita de carácter personal, profesional o
      institucional entre un remitente y un destinatario.
    rasgos:
      - Lugar y fecha al inicio o final
      - Fórmula de saludo personalizada
      - Tono narrativo, no estandarizado
      - Firma manuscrita
    instrucciones:
      titulo: |
        Fórmula: "Carta de [remitente] a [destinatario] [sobre asunto si
        es claro]". Si es correspondencia privada, mantén la descripción
        sobria y respetuosa.

  - clave: telegrama
    nombre: Telegrama
    familia: personal
    descripcion: |
      Comunicación telegráfica breve, con sintaxis comprimida y
      formato impreso normalizado por la compañía telegráfica.
    rasgos:
      - Formulario impreso preimpreso
      - Texto en mayúsculas, muy conciso
      - Ausencia de preposiciones y artículos
      - Indicación del número de palabras y tasa

  # ---------- Judicial y notarial -----------------------------------------
  - clave: sentencia
    nombre: Sentencia
    familia: judicial
    descripcion: |
      Resolución judicial que pone fin a un proceso, pronunciándose
      sobre las pretensiones de las partes.
    rasgos:
      - Encabezado con tribunal, ponente y número
      - Apartados "Antecedentes de hecho", "Fundamentos de derecho", "Fallo"
      - Firma del juez y fedatario

  - clave: escritura_notarial
    nombre: Escritura notarial
    familia: notarial
    descripcion: |
      Documento público autorizado por notario que recoge un negocio
      jurídico o declaración de voluntad (compraventa, poder,
      constitución de sociedad...).
    rasgos:
      - "En [lugar], a [fecha]. Ante mí, [notario]..."
      - Identificación de otorgantes
      - Cláusulas numeradas
      - Signo notarial, firmas y rúbrica

  - clave: testamento
    nombre: Testamento
    familia: notarial
    descripcion: |
      Declaración de última voluntad, ordinariamente otorgada ante
      notario y testigos, por la que una persona dispone de sus bienes
      para después de su muerte.
    rasgos:
      - Invocación inicial ("In Dei nomine" en época moderna)
      - Declaración de sano juicio
      - Disposiciones sobre exequias, mandas y herencia
      - Nombramiento de herederos y albaceas

  - clave: protocolo_notarial
    nombre: Protocolo notarial
    familia: notarial
    descripcion: |
      Libro o conjunto encuadernado de escrituras matrices autorizadas
      por un notario durante un periodo, generalmente anual.
    rasgos:
      - Encuadernación en pergamino o piel
      - Foliación continua
      - Sucesión cronológica de escrituras
    instrucciones:
      nivel_descripcion: |
        Un protocolo completo es habitualmente "unidad_documental_compuesta"
        o "subserie"; una escritura concreta extraída, "unidad_documental_simple".

  # ---------- Eclesiástico -------------------------------------------------
  - clave: libro_sacramental
    nombre: Libro sacramental
    familia: eclesiastico
    descripcion: |
      Registro parroquial de administración de sacramentos: bautismos,
      matrimonios o defunciones.
    rasgos:
      - Asientos consecutivos con fecha
      - Fórmulas sacramentales fijas
      - Firma del párroco oficiante
      - Frecuente anotación marginal del nombre

  - clave: visita_pastoral
    nombre: Visita pastoral
    familia: eclesiastico
    descripcion: |
      Acta de la visita canónica realizada por el obispo o su
      delegado a una parroquia, con inspección de libros, inventario
      de bienes y mandatos.
    rasgos:
      - Encabezado "Visita de..." o "Auto de visita"
      - Revisión de libros sacramentales
      - Mandatos al párroco
      - Firma episcopal o del visitador

  - clave: bula
    nombre: Bula
    familia: eclesiastico
    descripcion: |
      Documento pontificio solemne, autenticado con sello de plomo
      (bulla), que contiene decisiones sobre materias de gobierno,
      concesiones o doctrina.
    rasgos:
      - Invocación trinitaria inicial
      - Fórmula "Servus servorum Dei"
      - Texto latino solemne
      - Sello de plomo pendiente

  # ---------- Registros y series contables --------------------------------
  - clave: libro_registro
    nombre: Libro de registro
    familia: administrativo
    descripcion: |
      Libro donde se anotan, por orden de entrada o salida, documentos,
      personas, bienes u operaciones, con una breve referencia de cada uno.
    rasgos:
      - Entradas tabuladas por fecha
      - Numeración correlativa
      - Asientos breves y estandarizados
    instrucciones:
      nivel_descripcion: |
        Un libro completo es "unidad_documental_compuesta" o "subserie";
        un asiento concreto, "unidad_documental_simple".

  - clave: libro_contable
    nombre: Libro contable
    familia: contable
    descripcion: |
      Libro de contabilidad (diario, mayor, caja, balance) donde se
      anotan operaciones económicas por orden cronológico o sistemático.
    rasgos:
      - Columnas de debe y haber
      - Totales y balances periódicos
      - Rúbrica del contable o fedatario

  - clave: padron
    nombre: Padrón
    familia: administrativo
    descripcion: |
      Registro nominal de habitantes, vecinos o contribuyentes de un
      término municipal, con fines administrativos o fiscales.
    rasgos:
      - Listado por calles, casas o contribuyentes
      - Columnas de datos personales y, en su caso, económicos
      - Frecuentemente encuadernado

  # ---------- Gráfico y cartográfico --------------------------------------
  - clave: plano
    nombre: Plano
    familia: grafico
    descripcion: |
      Representación gráfica a escala de un terreno, edificio o
      estructura, habitualmente en proyección ortogonal.
    rasgos:
      - Cartela con título, escala, autor y fecha
      - Leyenda de símbolos
      - Dibujo técnico en tinta o impreso
    instrucciones:
      titulo: |
        Usa la cartela del plano. Formato: "Plano de [objeto
        representado] · [ubicación] · [autor, si consta]".
      alcance: |
        Describe objeto, técnica (tinta, lápiz, impreso), escala y
        elementos representados. No interpretes; describe lo visible.

  - clave: mapa
    nombre: Mapa
    familia: grafico
    descripcion: |
      Representación cartográfica de un territorio, habitualmente a
      escala menor que el plano y con cobertura regional o mayor.
    rasgos:
      - Título con cobertura geográfica
      - Escala numérica y gráfica
      - Coordenadas, rosa de los vientos
      - Autor, editor, fecha

  - clave: fotografia
    nombre: Fotografía
    familia: grafico
    descripcion: |
      Imagen obtenida por procedimiento fotoquímico o digital que
      fija una escena real en un momento dado.
    rasgos:
      - Soporte fotográfico identificable (papel, vidrio, película)
      - Posible anotación al dorso
      - Sello o cuño de estudio fotográfico
    instrucciones:
      titulo: |
        Fórmula descriptiva: "[Asunto fotografiado] · [lugar si se
        identifica] · [fecha o datación aproximada]". No inventes
        identificaciones de personas ni lugares.

  # ---------- Normativo ----------------------------------------------------
  - clave: disposicion_normativa
    nombre: Disposición normativa
    familia: administrativo
    descripcion: |
      Texto de carácter normativo: ley, decreto, reglamento, orden,
      ordenanza, con vocación de regir conductas o situaciones.
    rasgos:
      - Numeración oficial (Ley X/AAAA, Real Decreto Y/AAAA)
      - Estructura en artículos, títulos, capítulos
      - Exposición de motivos o preámbulo
      - Disposiciones adicionales, transitorias, derogatorias, finales
    instrucciones:
      titulo: |
        Usa la denominación oficial completa: tipo + número + fecha
        + objeto sintético.

  # ---------- Genérico de respaldo ----------------------------------------
  - clave: no_identificado
    nombre: Tipo no identificado
    familia: administrativo
    descripcion: |
      Categoría de respaldo para documentos cuyo tipo no puede
      determinarse con suficiente confianza a partir del contenido
      procesado.
    rasgos:
      - Ausencia de rasgos identificadores claros
      - Documento atípico o fragmentario
    instrucciones:
      titulo: |
        Redacta un título descriptivo genérico basado en el contenido
        visible, sin atribuir tipo documental.
