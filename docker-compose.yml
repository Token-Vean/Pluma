# =============================================================================
# PlumA — despliegue local
# -----------------------------------------------------------------------------
# Dos perfiles de despliegue, seleccionados automáticamente por el
# instalador según lo que encuentre en el equipo:
#
#   bundled   → Ollama dentro de Docker (recomendado para equipos sin
#               Ollama instalado). Todo autocontenido.
#
#   external  → la aplicación se conecta al Ollama que ya tiene el
#               usuario en el equipo anfitrión. No descarga ni motor
#               ni modelo si ya los tiene.
#
# El instalador exporta COMPOSE_PROFILES con el perfil correcto antes
# de llamar a `docker compose up`.
# =============================================================================

services:

  # ---------- Ollama en contenedor (perfil "bundled") ----------------------
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.21.2}
    container_name: archivo-ia-ollama
    profiles: ["bundled"]
    volumes:
      - ollama-models:/root/.ollama
    expose:
      - "11434"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 6g
    cpus: 4
    # Si tienes GPU NVIDIA, descomenta para acelerar 5-10x:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ---------- Aplicación con Ollama en contenedor --------------------------
  app:
    build: ./backend
    container_name: archivo-ia-app
    profiles: ["bundled"]
    depends_on:
      - ollama
    environment:
      OLLAMA_URL: http://ollama:11434
      MODELO_BASE: ${MODELO_BASE:-gemma4:e2b}
      MODELO_NOMBRE: ${MODELO_NOMBRE:-pluma}
      MODELFILE_PATH: /app/Modelfile
      PERFIL: bundled
      PUERTO: "8081"
      USAR_SANDBOX_PARSERS: ${USAR_SANDBOX_PARSERS:-true}
      SANDBOX_TIMEOUT_SEGUNDOS: ${SANDBOX_TIMEOUT_SEGUNDOS:-90}
      SANDBOX_MEMORIA_MB: ${SANDBOX_MEMORIA_MB:-1536}
      ALLOW_REMOTE_OLLAMA: ${ALLOW_REMOTE_OLLAMA:-false}
      ALLOW_NETWORK_EXPOSURE: ${ALLOW_NETWORK_EXPOSURE:-false}
      INCLUIR_HASH_DOCUMENTO_AUDITORIA: ${INCLUIR_HASH_DOCUMENTO_AUDITORIA:-true}
      PERMITIR_APAGADO_UI: ${PERMITIR_APAGADO_UI:-true}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-32768}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-8192}
      MAX_LONGITUD_TEXTO_EXTRAIDO: ${MAX_LONGITUD_TEXTO_EXTRAIDO:-800000}
      MAX_LONGITUD_VALOR_LLM: ${MAX_LONGITUD_VALOR_LLM:-50000}
      MAX_LONGITUD_EVIDENCIA_LLM: ${MAX_LONGITUD_EVIDENCIA_LLM:-4000}
      MAX_LONGITUD_ITEM_LISTA_LLM: ${MAX_LONGITUD_ITEM_LISTA_LLM:-5000}
      MAX_EXPORT_BODY_BYTES: ${MAX_EXPORT_BODY_BYTES:-15728640}
      MAX_LONGITUD_VALOR_EXPORTACION: ${MAX_LONGITUD_VALOR_EXPORTACION:-50000}
      MAX_LONGITUD_EVIDENCIA_EXPORTACION: ${MAX_LONGITUD_EVIDENCIA_EXPORTACION:-8000}
    ports:
      - "127.0.0.1:${PUERTO:-8082}:8081"
    volumes:
      - ./schemas:/app/schemas:ro
      - ./Modelfile:/app/Modelfile:ro
      - ./frontend/static:/app/static:ro
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    pids_limit: 256
    mem_limit: 2g
    cpus: 2
    tmpfs:
      - /tmp:size=512M,mode=1777
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/api/estado', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------- Aplicación que usa el Ollama del anfitrión -------------------
  # Servicio idéntico al anterior pero sin depender del contenedor de
  # Ollama. Se conecta al Ollama del equipo mediante host.docker.internal,
  # que funciona en Docker Desktop (Windows, macOS) nativamente y en
  # Linux gracias al mapping de extra_hosts.
  app-external:
    build: ./backend
    container_name: archivo-ia-app
    profiles: ["external"]
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      MODELO_BASE: ${MODELO_BASE:-gemma4:e2b}
      MODELO_NOMBRE: ${MODELO_NOMBRE:-pluma}
      MODELFILE_PATH: /app/Modelfile
      PERFIL: external
      PUERTO: "8081"
      USAR_SANDBOX_PARSERS: ${USAR_SANDBOX_PARSERS:-true}
      SANDBOX_TIMEOUT_SEGUNDOS: ${SANDBOX_TIMEOUT_SEGUNDOS:-90}
      SANDBOX_MEMORIA_MB: ${SANDBOX_MEMORIA_MB:-1536}
      ALLOW_REMOTE_OLLAMA: ${ALLOW_REMOTE_OLLAMA:-false}
      ALLOW_NETWORK_EXPOSURE: ${ALLOW_NETWORK_EXPOSURE:-false}
      INCLUIR_HASH_DOCUMENTO_AUDITORIA: ${INCLUIR_HASH_DOCUMENTO_AUDITORIA:-true}
      PERMITIR_APAGADO_UI: ${PERMITIR_APAGADO_UI:-true}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-32768}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-8192}
      MAX_LONGITUD_TEXTO_EXTRAIDO: ${MAX_LONGITUD_TEXTO_EXTRAIDO:-800000}
      MAX_LONGITUD_VALOR_LLM: ${MAX_LONGITUD_VALOR_LLM:-50000}
      MAX_LONGITUD_EVIDENCIA_LLM: ${MAX_LONGITUD_EVIDENCIA_LLM:-4000}
      MAX_LONGITUD_ITEM_LISTA_LLM: ${MAX_LONGITUD_ITEM_LISTA_LLM:-5000}
      MAX_EXPORT_BODY_BYTES: ${MAX_EXPORT_BODY_BYTES:-15728640}
      MAX_LONGITUD_VALOR_EXPORTACION: ${MAX_LONGITUD_VALOR_EXPORTACION:-50000}
      MAX_LONGITUD_EVIDENCIA_EXPORTACION: ${MAX_LONGITUD_EVIDENCIA_EXPORTACION:-8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${PUERTO:-8082}:8081"
    volumes:
      - ./schemas:/app/schemas:ro
      - ./Modelfile:/app/Modelfile:ro
      - ./frontend/static:/app/static:ro
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    pids_limit: 256
    mem_limit: 2g
    cpus: 2
    tmpfs:
      - /tmp:size=512M,mode=1777
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/api/estado', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  ollama-models:
