# =============================================================================
# PlumA — despliegue local bloqueado
# -----------------------------------------------------------------------------
# Release pública local-first.
#
# Cambios 0.6.0-beta respecto a 0.5.0-beta:
# - Se elimina el bind mount del Modelfile y las variables MODELO_NOMBRE y
#   MODELFILE_PATH. El comportamiento del asistente (system prompt y
#   parámetros de inferencia) vive ahora en schemas/pluma-runtime.yaml y se
#   inyecta en cada llamada a Ollama desde el backend; ya no se crea un
#   modelo derivado con `ollama create`.
# - Imagen actualizada a pluma-app:0.6.0-beta.
# - El servicio Ollama interno está bajo el profile `bundled`. El instalador
#   detecta si el usuario tiene Ollama nativo en el host con el modelo
#   descargado y, si es así, activa el modo "host" (no se arranca el Ollama
#   del contenedor; la app se conecta a host.docker.internal:11434). En caso
#   contrario, activa el profile bundled y se arranca el Ollama Docker.
# - El servicio `app` declara `extra_hosts: host.docker.internal:host-gateway`
#   para que `host.docker.internal` resuelva también desde contenedores en
#   Linux (en Windows/macOS ya resuelve de fábrica).
#
# Revisión de endurecimiento (posterior a 0.6.0-beta):
# - La imagen de Ollama queda fijada en este fichero y deja de leerse de .env
#   (OLLAMA_IMAGE ya no existe como variable): el saneador del instalador
#   elimina de .env las variables sensibles, pero OLLAMA_IMAGE quedaba fuera
#   de esa lista y permitía sustituir desde un .env manipulado precisamente
#   el contenedor que recibe el texto íntegro de los documentos y que tiene
#   salida a Internet. Pendiente: fijar también por digest sha256 tras
#   validar un build conocido-bueno (ver KNOWN_ISSUES.md).
# - `restart: "no"` también en Ollama: con unless-stopped, Ollama rearrancaba
#   con cada inicio de Docker Desktop ocupando varios GB de RAM aunque el
#   usuario no estuviera usando PlumA.
# - `cap_drop: ALL` también en el contenedor de Ollama, alineándolo con el de
#   la app. VALIDAR en perfil bundled (CPU y, si aplica, GPU) antes de
#   release; si Ollama requiere capacidades concretas, documentarlas aquí.
# - El puerto publicado se mantiene FIJO en 127.0.0.1:8082, ahora de forma
#   explícita y coherente en todos los ficheros: PUERTO desaparece de .env,
#   README e instaladores como variable de usuario (era configuración muerta
#   que desincronizaba instalador y compose). Menos superficie de
#   configuración y un invariante literal verificable por
#   security_static_check.py sin relajar el check.
# - El healthcheck lee el puerto interno de la variable PUERTO del contenedor
#   en lugar de hardcodear 8081.
#
# Configuración heredada de 0.5.0-beta:
# - El puerto de la aplicación se publica solo en 127.0.0.1 (loopback IPv4).
# - La red de la app NO se marca como internal:true, porque en Docker
#   Desktop/Compose podía impedir que Windows accediera al puerto publicado.
#   Consecuencia honesta: el bloqueo de salida a red es APLICATIVO, no de
#   red. Ver la sección de garantías del README y SECURITY_HARDENING.md.
# - El bloqueo local se mantiene por capas: host_ip 127.0.0.1, middleware de
#   Host/Origin/CSRF, OLLAMA_URL forzado y rechazo de configuración remota.
#
# Objetivo: impedir que PlumA se convierta accidentalmente en un servicio de red
# o que envíe documentos a un endpoint LLM remoto, manteniendo la interfaz
# accesible desde el navegador local del usuario.
# =============================================================================

name: pluma

services:
  ollama:
    # Imagen fijada deliberadamente en el fichero, sin override desde .env.
    # Para cambiarla hay que editar este fichero: es una decisión consciente
    # y auditable, no una variable de entorno.
    image: ollama/ollama:0.21.2
    container_name: pluma-ollama
    profiles:
      - bundled
    volumes:
      - ollama-models:/root/.ollama
      - ./offline/models:/offline/models:ro
    expose:
      - "11434"
    restart: "no"
    networks:
      - pluma-internal
      - pluma-egress
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 6g
    cpus: 4

  app:
    image: pluma-app:0.6.0-beta
    build: ./backend
    container_name: pluma-app
    environment:
      # Valores bloqueados de la release pública. PLUMA_OLLAMA_URL solo puede
      # apuntar a Ollama local validado por el backend: contenedor interno o
      # host.docker.internal si el instalador detecta el modelo ya instalado
      # en Ollama de Windows/macOS/Linux.
      OLLAMA_URL: ${PLUMA_OLLAMA_URL:-http://ollama:11434}
      PLUMA_OLLAMA_MODE: ${PLUMA_OLLAMA_MODE:-container}
      PLUMA_STRICT_LOCAL: "true"
      ALLOW_REMOTE_OLLAMA: "false"
      ALLOW_NETWORK_EXPOSURE: "false"
      PERFIL: bundled-local-locked
      PUERTO: "8081"
      # Parámetros funcionales permitidos.
      # MODELO_BASE controla qué modelo de Ollama se usa. El comportamiento
      # del asistente (system prompt y parámetros de inferencia) vive en
      # schemas/pluma-runtime.yaml, no aquí.
      MODELO_BASE: ${MODELO_BASE:-gemma4:e2b}
      MODELO_VISUAL_LECTURA: ${MODELO_VISUAL_LECTURA:-gemma4:e2b}
      PLUMA_LECTURA_VISUAL_PREVIA: ${PLUMA_LECTURA_VISUAL_PREVIA:-true}
      MAX_TRANSCRIPCION_VISUAL: ${MAX_TRANSCRIPCION_VISUAL:-12000}
      USAR_SANDBOX_PARSERS: ${USAR_SANDBOX_PARSERS:-true}
      PLUMA_PDF_HIBRIDO_CON_IMAGENES: ${PLUMA_PDF_HIBRIDO_CON_IMAGENES:-false}
      SANDBOX_TIMEOUT_SEGUNDOS: ${SANDBOX_TIMEOUT_SEGUNDOS:-90}
      SANDBOX_MEMORIA_MB: ${SANDBOX_MEMORIA_MB:-1536}
      INCLUIR_HASH_DOCUMENTO_AUDITORIA: ${INCLUIR_HASH_DOCUMENTO_AUDITORIA:-true}
      PERMITIR_APAGADO_UI: ${PERMITIR_APAGADO_UI:-false}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-4096}
      MAX_LONGITUD_TEXTO_EXTRAIDO: ${MAX_LONGITUD_TEXTO_EXTRAIDO:-800000}
      MAX_LONGITUD_VALOR_LLM: ${MAX_LONGITUD_VALOR_LLM:-50000}
      MAX_LONGITUD_EVIDENCIA_LLM: ${MAX_LONGITUD_EVIDENCIA_LLM:-4000}
      MAX_LONGITUD_ITEM_LISTA_LLM: ${MAX_LONGITUD_ITEM_LISTA_LLM:-5000}
      MAX_EXPORT_BODY_BYTES: ${MAX_EXPORT_BODY_BYTES:-15728640}
      MAX_LONGITUD_VALOR_EXPORTACION: ${MAX_LONGITUD_VALOR_EXPORTACION:-50000}
      MAX_LONGITUD_EVIDENCIA_EXPORTACION: ${MAX_LONGITUD_EVIDENCIA_EXPORTACION:-8000}
    ports:
      # Publicación fija por diseño: 127.0.0.1:8082. Cambiarla exige editar
      # este fichero y los scripts instalar/detener de forma consciente.
      - target: 8081
        published: "8082"
        protocol: tcp
        host_ip: "127.0.0.1"
    volumes:
      - ./schemas:/app/schemas:ro
      - ./frontend/static:/app/static:ro
    # Para que host.docker.internal resuelva al anfitrión en Linux. En
    # Windows/macOS ya está disponible de fábrica; esta directiva es inocua.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
    networks:
      - pluma-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    pids_limit: 256
    mem_limit: 2g
    cpus: 2
    tmpfs:
      - /tmp:size=512M,mode=1777
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ.get('PUERTO', '8081') + '/api/estado', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  ollama-models:

networks:
  pluma-internal:
    internal: false
  pluma-egress:
    internal: false
