# =============================================================================
# Esquema ISAD(G) para PlumA
# -----------------------------------------------------------------------------
# Norma Internacional General de Descripción Archivística, 2ª ed., CIA, 2000
# 26 elementos agrupados en 7 áreas. 6 elementos obligatorios para el
# intercambio internacional de información.
#
# Convenciones del esquema:
#   id            código oficial de la norma (3.x.x)
#   clave         identificador interno y clave en JSON de salida
#   tipo          texto | fecha | lista
#   obligatorio   true si la norma lo declara esencial
#   multiple      true si admite varios valores
#   extraible     si      → la IA lo propone
#                 parcial → la IA lo propone solo si aparece en el documento
#                 no      → campo manual; la IA no lo toca
#   instruccion   prompt inyectado al LLM (null si extraible: no)
#   ead           ruta de mapeo a EAD3 para exportación
# =============================================================================

norma: ISAD(G)
version: "2.0"
nombre: Norma Internacional General de Descripción Archivística
idioma: es

areas:

  # ---------------------------------------------------------------------------
  - id: identificacion
    nombre: Área de identificación
    elementos:

      - id: "3.1.1"
        clave: codigo_referencia
        nombre: Código de referencia
        tipo: texto
        obligatorio: true
        multiple: true
        extraible: parcial
        instruccion: |
          Busca signaturas, códigos de referencia archivística o números
          de expediente que aparezcan en el documento (cabeceras, sellos,
          márgenes, pies de página). Si no figura ninguno explícitamente,
          deja el campo vacío. No inventes códigos ni los deduzcas del
          nombre del fichero.
        ead: "did/unitid"

      - id: "3.1.2"
        clave: titulo
        nombre: Título
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: si
        instruccion: |
          Propón un título archivístico informativo y suficientemente
          específico. No lo reduzcas artificialmente si el contexto exige
          precisión: puede incluir tipo documental, asunto, agente principal,
          lugar y fecha. Si el documento tiene título formal, úsalo entre
          comillas. Si no, redacta uno atribuido siguiendo la fórmula:
          tipo documental + asunto + agente principal + ámbito geográfico
          y/o cronológico cuando sea pertinente. Extensión orientativa:
          15-50 palabras; excepcionalmente hasta 80 si es necesario para
          evitar ambigüedad. No conviertas el título en un resumen completo;
          reserva el desarrollo para "alcance y contenido".
          Ejemplo: "Acta de la sesión plenaria del Ayuntamiento de Madrid
          relativa a la aprobación del presupuesto municipal de 1923, de 12
          de marzo de 1923".
        ead: "did/unittitle"

      - id: "3.1.3"
        clave: fechas
        nombre: Fechas
        tipo: fecha
        obligatorio: true
        multiple: true
        extraible: si
        instruccion: |
          Identifica fechas de creación o vigencia del documento. Devuelve
          en formato ISO 8601 (YYYY-MM-DD o rango YYYY-MM-DD/YYYY-MM-DD).
          Si solo hay año, usa YYYY. Distingue fecha de creación
          (preferente) de fechas mencionadas en el contenido (descartar).
          Si la fecha es aproximada, antepón [ca. ].
        ead: "did/unitdate"

      - id: "3.1.4"
        clave: nivel_descripcion
        nombre: Nivel de descripción
        tipo: lista
        obligatorio: true
        multiple: false
        extraible: si
        valores:
          - fondo
          - subfondo
          - serie
          - subserie
          - unidad_documental_compuesta
          - unidad_documental_simple
        instruccion: |
          Determina el nivel jerárquico. Por defecto, un documento
          individual subido al asistente es "unidad_documental_simple".
          Elige otro nivel solo si el contenido indica claramente que se
          trata de un agrupamiento (índice de un expediente, portada de
          una serie, cuadro de clasificación, etc.).
        ead: "@level"

      - id: "3.1.5"
        clave: volumen_soporte
        nombre: Volumen y soporte de la unidad de descripción
        tipo: texto
        obligatorio: true
        multiple: true
        extraible: parcial
        instruccion: |
          Indica extensión y soporte. La extensión (número de hojas, folios
          o páginas) puede inferirse del documento procesado. El soporte
          original NO debe suponerse a partir del fichero digital: si el
          documento contiene indicios (mención a "papel", "pergamino",
          "fotografía", etc.) inclúyelo; en caso contrario, indica solo
          la extensión y deja el soporte para revisión manual.
          Ejemplo: "12 hojas".
        ead: "did/physdesc/extent"

  # ---------------------------------------------------------------------------
  - id: contexto
    nombre: Área de contexto
    elementos:

      - id: "3.2.1"
        clave: nombre_productor
        nombre: Nombre del/los productor/es
        tipo: texto
        obligatorio: true
        multiple: true
        extraible: si
        instruccion: |
          Identifica la institución, persona o familia responsable de la
          producción del documento. Búscalo en membretes, firmas, sellos
          o encabezados. Forma normalizada cuando sea posible: nombre
          completo de la institución o "Apellidos, Nombre" para personas.
          Si hay varios productores, lístalos por orden de relevancia.
        ead: "did/origination"

      - id: "3.2.2"
        clave: historia_institucional
        nombre: Historia institucional / Reseña biográfica
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Si el documento permite identificar al productor, redacta una
          breve nota contextual (máx. 100 palabras) basada SOLO en
          información presente en el documento. No completes con
          conocimiento general sobre la institución salvo que sea
          estrictamente necesario; en ese caso, márcalo como
          "[contexto añadido]" para que el archivero lo revise.
        ead: "bioghist"

      - id: "3.2.3"
        clave: historia_archivistica
        nombre: Historia archivística
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        ead: "custodhist"

      - id: "3.2.4"
        clave: forma_ingreso
        nombre: Forma de ingreso
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        ead: "acqinfo"

  # ---------------------------------------------------------------------------
  - id: contenido
    nombre: Área de contenido y estructura
    elementos:

      - id: "3.3.1"
        clave: alcance_contenido
        nombre: Alcance y contenido
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: si
        instruccion: |
          Redacta un resumen archivístico desarrollado del contenido. No lo
          limites a una frase si el documento es denso. Debe identificar,
          cuando aparezcan en el documento: tipo documental, asunto principal,
          objeto del procedimiento o acto, agentes intervinientes, ámbito
          geográfico, cronología, trámites o partes documentales relevantes,
          resolución o resultado y documentos anexos. Redacción objetiva,
          sin valorar y sin incorporar información externa no presente en el
          documento. Empieza por el tipo documental.

          Extensión orientativa: 120-250 palabras para documentos simples;
          250-600 palabras para expedientes, informes largos o documentos con
          varios actos, anexos o agentes. Prioriza precisión contextual frente
          a brevedad.

          Ejemplo: "Expediente administrativo relativo a la concesión de
          licencia de obras a... en la calle... entre 1925 y 1927. Incluye
          solicitud, informes técnicos, requerimientos de subsanación,
          comunicaciones internas, resolución y notificación al interesado."
        ead: "scopecontent"

      - id: "3.3.2"
        clave: valoracion_seleccion
        nombre: Valoración, selección y eliminación
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        ead: "appraisal"

      - id: "3.3.3"
        clave: nuevos_ingresos
        nombre: Nuevos ingresos
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        ead: "accruals"

      - id: "3.3.4"
        clave: organizacion
        nombre: Organización (Sistema de organización)
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Solo aplicable a unidades documentales compuestas o niveles
          superiores. Describe la estructura interna o el criterio de
          ordenación si es deducible del documento (cronológico, alfabético,
          temático, por procedencia). Si es una unidad documental simple
          o no se aprecia estructura, deja el campo vacío.
        ead: "arrangement"

  # ---------------------------------------------------------------------------
  - id: condiciones_acceso
    nombre: Área de condiciones de acceso y uso
    elementos:

      - id: "3.4.1"
        clave: condiciones_acceso
        nombre: Condiciones de acceso
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Si el documento contiene marcas de clasificación de seguridad
          ("Secreto", "Reservado", "Confidencial") o indicios de datos
          personales sensibles (datos de salud, religiosos, judiciales,
          de menores), indícalo y advierte de la posible necesidad de
          restricción según la legislación vigente (LOPDGDD, Ley de
          Patrimonio Histórico). En caso contrario, deja el campo vacío.
        ead: "accessrestrict"

      - id: "3.4.2"
        clave: condiciones_reproduccion
        nombre: Condiciones de reproducción
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        ead: "userestrict"

      - id: "3.4.3"
        clave: lengua_escritura
        nombre: Lengua/escritura(s) de los documentos
        tipo: lista
        obligatorio: false
        multiple: true
        extraible: si
        instruccion: |
          Detecta la lengua o lenguas del documento. Devuelve códigos
          ISO 639-2 (spa, cat, eng, fra, lat, etc.). Si el documento es
          plurilingüe, lista todas. Si la escritura es relevante (gótica,
          humanística, taquigrafía), añádela como nota.
        ead: "did/langmaterial"

      - id: "3.4.4"
        clave: caracteristicas_fisicas
        nombre: Características físicas y requisitos técnicos
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Indica solo lo deducible del documento: tinta desvaída, manchas,
          roturas visibles, sellos de lacre, deterioro del soporte. NO
          incluyas el formato del fichero digital (PDF, JPG) salvo que el
          archivero lo solicite. Si el documento se ve íntegro y legible,
          deja el campo vacío.
        ead: "phystech"

      - id: "3.4.5"
        clave: instrumentos_descripcion
        nombre: Instrumentos de descripción
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        ead: "otherfindaid"

  # ---------------------------------------------------------------------------
  - id: documentacion_asociada
    nombre: Área de documentación asociada
    elementos:

      - id: "3.5.1"
        clave: existencia_originales
        nombre: Existencia y localización de los originales
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        ead: "originalsloc"

      - id: "3.5.2"
        clave: existencia_copias
        nombre: Existencia y localización de copias
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        ead: "altformavail"

      - id: "3.5.3"
        clave: unidades_relacionadas
        nombre: Unidades de descripción relacionadas
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Si el documento menciona explícitamente otros expedientes,
          signaturas o referencias a documentación relacionada
          ("véase expediente nº...", "anexo a...", "antecedente en..."),
          extráelos literalmente. No infieras relaciones que no estén
          declaradas en el texto.
        ead: "relatedmaterial"

      - id: "3.5.4"
        clave: nota_publicaciones
        nombre: Nota de publicaciones
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        ead: "bibliography"

  # ---------------------------------------------------------------------------
  - id: notas
    nombre: Área de notas
    elementos:

      - id: "3.6.1"
        clave: notas
        nombre: Notas
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Información relevante que no encaje en ningún otro campo:
          anotaciones marginales, sellos peculiares, firmas destacadas,
          tachaduras significativas, peculiaridades del soporte.
          Una nota por hallazgo. Si no hay nada destacable, deja vacío.
        ead: "odd"

  # ---------------------------------------------------------------------------
  - id: control
    nombre: Área de control de la descripción
    elementos:

      - id: "3.7.1"
        clave: nota_archivero
        nombre: Nota del archivero
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        ead: "processinfo"

      - id: "3.7.2"
        clave: reglas_normas
        nombre: Reglas o normas
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        valor_por_defecto: "ISAD(G), 2ª ed., 2000"
        instruccion: null
        ead: "control/descrules"

      - id: "3.7.3"
        clave: fecha_descripcion
        nombre: Fecha(s) de la(s) descripción(es)
        tipo: fecha
        obligatorio: false
        multiple: true
        extraible: no
        valor_por_defecto: auto  # se rellena con la fecha del sistema
        instruccion: null
        ead: "control/maintenancehistory/maintenanceevent/eventdatetime"
