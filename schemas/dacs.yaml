# =============================================================================
# Esquema DACS para PlumA
# -----------------------------------------------------------------------------
# Describing Archives: A Content Standard, 2nd Edition, SAA, 2013
# Single-level minimum: 4 elementos obligatorios.
# Single-level optimum: añade 5 más recomendados.
# Multilevel description: aplica los 25 elementos completos.
#
# DACS es la norma de uso en bibliotecas y archivos anglosajones (EE.UU.,
# Canadá). Equivalente funcional a ISAD-G pero con su propio vocabulario.
# Ver https://saa-ts-dacs.github.io/dacs/
#
# Convenciones del esquema (idénticas a las demás normas de PlumA):
#   id            código DACS (ej. 2.1, 3.1)
#   clave         identificador interno y clave en JSON de salida
#   tipo          texto | fecha | lista
#   obligatorio   true si la norma lo declara esencial
#   multiple      true si admite varios valores
#   extraible     si      → la IA lo propone
#                 parcial → la IA lo propone solo si aparece en el documento
#                 no      → campo manual; la IA no lo toca
#   instruccion   prompt inyectado al LLM (null si extraible: no)
#   ead           ruta de mapeo a EAD3 para exportación
# =============================================================================

norma: DACS
version: "2.0"
nombre: Describing Archives - A Content Standard
nombre_en: Describing Archives - A Content Standard
idioma: es

areas:

  # ---------------------------------------------------------------------------
  - id: identidad
    nombre: Identity Elements
    elementos:

      - id: "2.1"
        clave: reference_code
        nombre: Reference Code
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: parcial
        instruccion: |
          Identifies the descriptive unit. Look for accession numbers,
          collection numbers, or call numbers in headers, stamps,
          margins, or footers. Do not invent codes; if no explicit code
          is present, leave the field empty.
        ead: "did/unitid"

      - id: "2.2"
        clave: name_title
        nombre: Name and Location of Repository
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          The name and location of the repository holding the materials,
          if it appears explicitly in the document (institutional
          letterheads, archival stamps).
        ead: "did/repository"

      - id: "2.3"
        clave: title
        nombre: Title
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: si
        instruccion: |
          Concise descriptive title. May be supplied by the cataloger
          if no formal title exists. Form: '[Type of material] of/by
          [creator] regarding [subject], [dates if known]'.
        ead: "did/unittitle"

      - id: "2.4"
        clave: date
        nombre: Date
        tipo: lista
        obligatorio: true
        multiple: true
        extraible: si
        instruccion: |
          Date(s) of creation. Use ISO 8601 format (YYYY-MM-DD or
          YYYY-MM or YYYY). For ranges use YYYY/YYYY. Distinguish
          inclusive dates (full range) from bulk dates (when most
          material was created) if both are evident.
        ead: "did/unitdate"

      - id: "2.5"
        clave: extent
        nombre: Extent
        tipo: lista
        obligatorio: true
        multiple: true
        extraible: parcial
        instruccion: |
          Quantity of material described. Use standardized terms:
          'X linear feet', 'X cubic feet', 'X items', 'X folders',
          'X boxes'. Include both physical extent and, if applicable,
          digital extent (file size, number of files).
        ead: "did/physdesc/extent"

      - id: "2.6"
        clave: name_of_creator
        nombre: Name of Creator(s)
        tipo: lista
        obligatorio: true
        multiple: true
        extraible: si
        instruccion: |
          Person(s), family, or corporate body responsible for creating,
          accumulating, or assembling the materials. Use the
          authoritative form of the name when known (e.g., 'Lastname,
          Firstname' for persons; full official name for organizations).
        ead: "did/origination"

  # ---------------------------------------------------------------------------
  - id: contexto
    nombre: Context Elements
    elementos:

      - id: "2.7"
        clave: administrative_biographical_history
        nombre: Administrative/Biographical History
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Brief history of the creator. For persons: dates of birth and
          death, profession, key activities. For organizations: dates
          of founding and dissolution, mission, key activities. Only
          include if information appears explicitly or can be inferred
          with high confidence from the document.
        ead: "bioghist/p"

      - id: "3.1"
        clave: scope_and_content
        nombre: Scope and Content
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: si
        instruccion: |
          Summary of the materials. Includes types of documents,
          subjects covered, persons mentioned, geographic places,
          time periods, and significant events. Be concise but
          informative; aim for 3-6 sentences.
        ead: "scopecontent/p"

  # ---------------------------------------------------------------------------
  - id: condiciones
    nombre: Conditions of Access and Use
    elementos:

      - id: "4.1"
        clave: conditions_governing_access
        nombre: Conditions Governing Access
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Restrictions on access (legal, donor-imposed, physical
          condition). Examples: 'Restricted until 2050', 'Open for
          research', 'Fragile materials require staff supervision'.
          Only fill if explicitly stated.
        ead: "accessrestrict/p"

      - id: "4.2"
        clave: conditions_governing_reproduction
        nombre: Conditions Governing Reproduction and Use
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Copyright status, donor restrictions on reproduction,
          publication rights. Examples: 'Copyright held by donor',
          'Public domain', 'Permission required for publication'.
        ead: "userestrict/p"

      - id: "4.3"
        clave: languages
        nombre: Languages and Scripts
        tipo: lista
        obligatorio: false
        multiple: true
        extraible: si
        instruccion: |
          Languages used in the materials. Use ISO 639-3 three-letter
          codes (eng, spa, fra, deu, lat, ita, por, etc.). If only
          one language, return a single-element list.
        ead: "did/langmaterial/language"

  # ---------------------------------------------------------------------------
  - id: notas
    nombre: Notes
    elementos:

      - id: "7.1"
        clave: general_note
        nombre: General Note
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Information that does not fit elsewhere but is significant
          for understanding the materials. Examples: provenance details,
          related collections at other repositories, citation
          peculiarities.
        ead: "odd/p"

  # ---------------------------------------------------------------------------
  - id: control
    nombre: Description Control
    elementos:

      - id: "8.1.4"
        clave: rules_or_conventions
        nombre: Rules or Conventions
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        ead: "control/conventiondeclaration/citation"

      - id: "8.1.5"
        clave: dates_of_descriptions
        nombre: Date(s) of Descriptions
        tipo: lista
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        ead: "control/maintenancehistory/maintenanceevent/eventdatetime"
