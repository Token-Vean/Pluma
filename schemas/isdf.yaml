# =============================================================================
# Esquema ISDF para PlumA
# -----------------------------------------------------------------------------
# Norma Internacional para la Descripción de Funciones, 1ª ed., CIA, 2007.
# 23 elementos agrupados en 4 áreas.
#
# Caso de uso típico: el archivero está describiendo una serie documental y
# necesita formalizar la(s) función(es) que la generaron. El asistente
# extrae lo deducible del documento y propone vínculos con productores
# (ISAAR(CPF)) y series (ISAD(G)) cuando hay evidencia textual.
# =============================================================================

norma: ISDF
version: "1.0"
nombre: Norma Internacional para la Descripción de Funciones
idioma: es

areas:

  # ---------------------------------------------------------------------------
  - id: identificacion
    nombre: Área de identificación
    elementos:

      - id: "5.1.1"
        clave: tipo
        nombre: Tipo
        tipo: lista
        obligatorio: true
        multiple: false
        extraible: si
        valores:
          - funcion
          - subfuncion
          - proceso
          - actividad
          - tarea
          - transaccion
        instruccion: |
          Determina el nivel de la actividad descrita. "Función" es la
          competencia más amplia (p. ej. gestión tributaria); "actividad"
          o "tarea" son operativas concretas. Por defecto, salvo
          evidencia de mayor o menor abstracción, usa "actividad".
        eac: "@functionType"

      - id: "5.1.2"
        clave: forma_autorizada
        nombre: Forma(s) autorizada(s) del nombre
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: si
        instruccion: |
          Denominación normalizada de la función. Sustantivo deverbal
          o frase nominal corta. Ejemplos: "Concesión de licencias de
          obra", "Liquidación del impuesto de bienes inmuebles",
          "Tramitación de expedientes sancionadores".
        eac: "nameEntry/part"

      - id: "5.1.3"
        clave: formas_paralelas
        nombre: Forma(s) paralela(s) del nombre
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Equivalentes en otras lenguas oficiales si aparecen
          literalmente en el documento. No traduzcas.
        eac: "nameEntryParallel"

      - id: "5.1.4"
        clave: otras_formas
        nombre: Otra(s) forma(s) del nombre
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Variantes históricas de la denominación, siglas o formas
          coloquiales que aparezcan en el documento.
        eac: "nameEntry"

      - id: "5.1.5"
        clave: clasificacion
        nombre: Clasificación
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        eac: "classification"

  # ---------------------------------------------------------------------------
  - id: contexto
    nombre: Área de contexto
    elementos:

      - id: "5.2.1"
        clave: fechas
        nombre: Fechas
        tipo: fecha
        obligatorio: true
        multiple: false
        extraible: parcial
        instruccion: |
          Fechas de inicio y, en su caso, fin de la función. Formato ISO
          8601, rango YYYY/YYYY. Solo si hay evidencia explícita en el
          documento (p. ej. norma de creación o supresión citada).
        eac: "existDates"

      - id: "5.2.2"
        clave: descripcion
        nombre: Descripción
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: si
        instruccion: |
          Descripción concisa (máx. 100 palabras) del propósito, alcance
          y procedimiento de la función. Redacción objetiva. Empieza
          por un verbo en infinitivo o sustantivo deverbal. Basada solo
          en lo que el documento permita inferir.
        eac: "description"

      - id: "5.2.3"
        clave: historia
        nombre: Historia
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Evolución de la función: cambios normativos, transferencias
          entre órganos, transformaciones de procedimiento. Solo si el
          documento aporta datos al respecto. No completes con
          conocimiento general.
        eac: "history"

      - id: "5.2.4"
        clave: legislacion
        nombre: Legislación
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Normativa que regula la función, citada literalmente en el
          documento (leyes, reglamentos, decretos, ordenanzas). Forma
          completa: "Ley X/AAAA, de DD de mes, sobre...". Una entrada
          por norma. No infieras legislación no mencionada.
        eac: "mandate"

  # ---------------------------------------------------------------------------
  - id: relaciones
    nombre: Área de relaciones
    elementos:

      - id: "5.3.1"
        clave: funciones_relacionadas
        nombre: Nombres / Identificadores de funciones relacionadas
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Otras funciones explícitamente mencionadas en el documento
          como vinculadas (predecesoras, sucesoras, jerárquicamente
          superiores o subordinadas, asociadas). Solo extracción
          textual, sin inferir relaciones.
        eac: "functionRelation"

      - id: "5.3.2"
        clave: tipo_relacion
        nombre: Tipo
        tipo: lista
        obligatorio: false
        multiple: true
        extraible: no
        valores:
          - jerarquica
          - temporal
          - asociativa
        instruccion: null
        eac: "functionRelation/@functionRelationType"

      - id: "5.3.3"
        clave: categoria_relacion
        nombre: Categoría
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        eac: "functionRelation/@category"

      - id: "5.3.4"
        clave: descripcion_relacion
        nombre: Descripción de la relación
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        eac: "functionRelation/descriptiveNote"

      - id: "5.3.5"
        clave: fechas_relacion
        nombre: Fechas de la relación
        tipo: fecha
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        eac: "functionRelation/dateRange"

  # ---------------------------------------------------------------------------
  - id: control
    nombre: Área de control
    elementos:

      - id: "5.4.1"
        clave: identificador
        nombre: Identificador de la descripción de la función
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: no
        valor_por_defecto: auto
        instruccion: null
        eac: "control/recordId"

      - id: "5.4.2"
        clave: identificadores_institucion
        nombre: Identificadores de la institución (responsable del registro)
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        eac: "control/otherRecordId"

      - id: "5.4.3"
        clave: reglas
        nombre: Reglas y/o convenciones
        tipo: texto
        obligatorio: true
        multiple: true
        extraible: no
        valor_por_defecto: "ISDF, 1ª ed., 2007"
        instruccion: null
        eac: "control/conventionDeclaration"

      - id: "5.4.4"
        clave: estado_elaboracion
        nombre: Estado de elaboración
        tipo: lista
        obligatorio: true
        multiple: false
        extraible: no
        valores:
          - borrador
          - finalizado
          - revisado
        valor_por_defecto: borrador
        instruccion: null
        eac: "control/maintenanceStatus"

      - id: "5.4.5"
        clave: nivel_detalle
        nombre: Nivel de detalle
        tipo: lista
        obligatorio: false
        multiple: false
        extraible: no
        valores:
          - minimo
          - parcial
          - completo
        instruccion: null
        eac: "control/publicationStatus"

      - id: "5.4.6"
        clave: fechas_descripcion
        nombre: Fechas
        tipo: fecha
        obligatorio: true
        multiple: true
        extraible: no
        valor_por_defecto: auto
        instruccion: null
        eac: "control/maintenanceHistory/maintenanceEvent/eventDateTime"

      - id: "5.4.7"
        clave: lenguas_escrituras
        nombre: Lengua(s) y escritura(s)
        tipo: lista
        obligatorio: true
        multiple: true
        extraible: no
        valor_por_defecto: ["spa"]
        instruccion: null
        eac: "control/languageDeclaration"

      - id: "5.4.8"
        clave: fuentes
        nombre: Fuentes
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: si
        instruccion: |
          Cita el documento procesado como fuente: tipo documental,
          fecha y signatura si la hay. Una entrada por fuente.
        eac: "control/sources"

      - id: "5.4.9"
        clave: notas_mantenimiento
        nombre: Notas de mantenimiento
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        eac: "control/maintenanceHistory/maintenanceEvent/eventDescription"
