# =============================================================================
# Esquema RIC simplificado para PlumA
# -----------------------------------------------------------------------------
# Records in Contexts - Conceptual Model 1.0, ICA, 2023.
#
# IMPORTANTE: PlumA implementa una versión SIMPLIFICADA de RIC. RIC es un
# modelo conceptual basado en grafos (entidades interconectadas mediante
# relaciones). Esta implementación cubre las CUATRO entidades fundamentales
# de RIC-CM como descripciones aisladas:
#
#   - Record       (un documento de archivo individual)
#   - RecordSet    (un conjunto de documentos: serie, fondo, etc.)
#   - Agent        (persona, familia o entidad colectiva)
#   - Activity     (función, actividad o proceso documentado)
#
# Lo que NO cubre esta versión:
#   - Las relaciones (RIC-Relations) que vinculan unas entidades con otras.
#   - La instanciación física vs. lógica.
#   - El modelo completo en RDF/OWL (RIC-O).
#
# Para casos de uso que requieran el grafo completo, consulta sistemas
# nativos RIC como AtoM 3.x (en desarrollo) o las herramientas del
# Archives Portal Europe.
#
# Para una primera aproximación a RIC, esta implementación es útil para
# describir entidades sueltas y exportarlas en RDF/Turtle compatible con
# RIC-O 1.0. El grafo posterior se construye en otra herramienta.
#
# Estructura del YAML: en lugar de "areas", usamos "perfiles". Cada
# perfil corresponde a un tipo de entidad RIC. El usuario elige el
# perfil ANTES de subir el documento (a diferencia de ISAD/DACS, donde
# todos los campos van juntos).
# =============================================================================

norma: RIC (simplificado)
version: "1.0"
nombre: Records in Contexts - Modelo Conceptual (versión simplificada)
nombre_en: Records in Contexts - Conceptual Model (simplified)
idioma: es

# Multi-perfil: el frontend pide al usuario qué tipo de entidad quiere
# describir antes de procesar el documento.
multi_perfil: true

perfiles:

  # ---------------------------------------------------------------------------
  - id: record
    clase: Record
    iri: "rico:Record"
    nombre: Documento (Record)
    descripcion: |
      Un documento de archivo individual: una unidad documental simple
      o compuesta concreta (un oficio, un acta, un expediente, una
      fotografía, un vídeo, un correo electrónico, etc.).
    
    areas:
      - id: identificacion
        nombre: Identificación
        elementos:
          - id: "rico:identifier"
            clave: identifier
            nombre: Identificador
            tipo: texto
            obligatorio: true
            multiple: true
            extraible: parcial
            instruccion: |
              Código de referencia, signatura o cualquier identificador
              estable del documento. Si no figura explícitamente en el
              propio documento, deja vacío.
          
          - id: "rico:name"
            clave: name
            nombre: Nombre / Título
            tipo: texto
            obligatorio: true
            multiple: false
            extraible: si
            instruccion: |
              Denominación del documento. Si tiene título formal, úsalo.
              Si no, construye un título descriptivo: '[Tipo documental]
              de/sobre [asunto] de [fecha]'.
      
      - id: caracterizacion
        nombre: Caracterización
        elementos:
          - id: "rico:type"
            clave: record_type
            nombre: Tipo documental
            tipo: texto
            obligatorio: false
            multiple: false
            extraible: si
            instruccion: |
              Tipología documental: oficio, acta, contrato, certificado,
              fotografía, plano, correo electrónico, etc.
          
          - id: "rico:hasCreationDate"
            clave: creation_date
            nombre: Fecha de creación
            tipo: lista
            obligatorio: true
            multiple: true
            extraible: si
            instruccion: |
              Fecha o intervalo de fechas en que se creó el documento.
              Formato ISO 8601 (YYYY-MM-DD, YYYY-MM o YYYY). Para
              intervalos: YYYY/YYYY.
          
          - id: "rico:descriptiveNote"
            clave: descriptive_note
            nombre: Nota descriptiva
            tipo: texto
            obligatorio: true
            multiple: false
            extraible: si
            instruccion: |
              Descripción narrativa del contenido del documento: asuntos,
              personas mencionadas, lugares, decisiones documentadas.
              3-6 frases.
      
      - id: contexto_minimo
        nombre: Contexto mínimo
        elementos:
          - id: "rico:hasOrCreator_name"
            clave: creator_name
            nombre: Productor (nombre)
            tipo: lista
            obligatorio: true
            multiple: true
            extraible: si
            instruccion: |
              Nombre de la persona, familia o institución que produjo
              el documento. Si la entidad está descrita aparte como
              Agent, se enlazará al exportar.
          
          - id: "rico:isOrWasSubjectOf_languageOfMaterial"
            clave: language
            nombre: Lengua
            tipo: lista
            obligatorio: false
            multiple: true
            extraible: si
            instruccion: |
              Lengua(s) del documento. Códigos ISO 639-3 (spa, eng, fra,
              cat, glg, eus, deu, ita, por, lat, etc.).

  # ---------------------------------------------------------------------------
  - id: recordset
    clase: RecordSet
    iri: "rico:RecordSet"
    nombre: Conjunto documental (RecordSet)
    descripcion: |
      Un agrupamiento de documentos: fondo, subfondo, serie, subserie,
      colección, dossier. Lo que tradicionalmente sería un "nivel
      superior" en ISAD-G.
    
    areas:
      - id: identificacion
        nombre: Identificación
        elementos:
          - id: "rico:identifier"
            clave: identifier
            nombre: Identificador
            tipo: texto
            obligatorio: true
            multiple: true
            extraible: parcial
            instruccion: |
              Código del fondo, serie o agrupamiento. Si no figura
              explícitamente, deja vacío.
          
          - id: "rico:name"
            clave: name
            nombre: Nombre / Título
            tipo: texto
            obligatorio: true
            multiple: false
            extraible: si
            instruccion: |
              Denominación del conjunto. Suele ser el nombre del fondo
              o de la serie.
      
      - id: caracterizacion
        nombre: Caracterización
        elementos:
          - id: "rico:hasRecordSetType"
            clave: recordset_type
            nombre: Tipo de conjunto
            tipo: texto
            obligatorio: true
            multiple: false
            extraible: si
            instruccion: |
              Tipo de agrupamiento. Valores recomendados: 'fondo',
              'subfondo', 'serie', 'subserie', 'colección', 'dossier'.
          
          - id: "rico:hasBeginningDate"
            clave: beginning_date
            nombre: Fecha inicial
            tipo: texto
            obligatorio: false
            multiple: false
            extraible: si
            instruccion: |
              Fecha del documento más antiguo del conjunto. Formato
              ISO 8601.
          
          - id: "rico:hasEndDate"
            clave: end_date
            nombre: Fecha final
            tipo: texto
            obligatorio: false
            multiple: false
            extraible: si
            instruccion: |
              Fecha del documento más reciente del conjunto. Formato
              ISO 8601.
          
          - id: "rico:descriptiveNote"
            clave: descriptive_note
            nombre: Alcance y contenido
            tipo: texto
            obligatorio: true
            multiple: false
            extraible: si
            instruccion: |
              Descripción narrativa del conjunto: tipos de documentos
              que contiene, asuntos cubiertos, periodo, personas o
              instituciones representadas.
      
      - id: contexto
        nombre: Contexto
        elementos:
          - id: "rico:hasOrCreator_name"
            clave: creator_name
            nombre: Productor (nombre)
            tipo: lista
            obligatorio: true
            multiple: true
            extraible: si
            instruccion: |
              Nombre de la persona, familia o institución que produjo
              el conjunto.

  # ---------------------------------------------------------------------------
  - id: agent
    clase: Agent
    iri: "rico:Agent"
    nombre: Agente (Agent)
    descripcion: |
      Una persona física, una familia, o una entidad colectiva
      (institución, empresa, asociación) relevante para el contexto
      archivístico. Equivale a ISAAR(CPF).
    
    areas:
      - id: identificacion
        nombre: Identificación
        elementos:
          - id: "rico:hasAgentType"
            clave: agent_type
            nombre: Tipo de agente
            tipo: texto
            obligatorio: true
            multiple: false
            extraible: si
            instruccion: |
              Tipo de agente. Valores: 'Person', 'Family',
              'CorporateBody'.
          
          - id: "rico:name"
            clave: name
            nombre: Nombre autorizado
            tipo: texto
            obligatorio: true
            multiple: false
            extraible: si
            instruccion: |
              Forma autorizada del nombre. Personas: 'Apellido,
              Nombre'. Instituciones: forma oficial completa.
          
          - id: "rico:hasOtherName"
            clave: other_names
            nombre: Otras formas del nombre
            tipo: lista
            obligatorio: false
            multiple: true
            extraible: parcial
            instruccion: |
              Variantes del nombre, formas paralelas, siglas o nombres
              previos.
      
      - id: existencia
        nombre: Fechas de existencia
        elementos:
          - id: "rico:hasBeginningDate"
            clave: birth_or_foundation
            nombre: Fecha de nacimiento o fundación
            tipo: texto
            obligatorio: false
            multiple: false
            extraible: si
            instruccion: |
              Para personas, fecha de nacimiento. Para instituciones,
              fecha de fundación. Formato ISO 8601.
          
          - id: "rico:hasEndDate"
            clave: death_or_dissolution
            nombre: Fecha de muerte o disolución
            tipo: texto
            obligatorio: false
            multiple: false
            extraible: si
            instruccion: |
              Para personas, fecha de fallecimiento (deja vacío si vive).
              Para instituciones, fecha de disolución. Formato ISO 8601.
      
      - id: descripcion
        nombre: Descripción
        elementos:
          - id: "rico:descriptiveNote"
            clave: descriptive_note
            nombre: Nota biográfica/histórica
            tipo: texto
            obligatorio: true
            multiple: false
            extraible: si
            instruccion: |
              Resumen biográfico (personas/familias) o histórico
              (instituciones). 3-6 frases con los hitos principales.

  # ---------------------------------------------------------------------------
  - id: activity
    clase: Activity
    iri: "rico:Activity"
    nombre: Actividad (Activity)
    descripcion: |
      Una función, actividad, proceso o evento documentado. Equivale
      a ISDF. Conecta los Records con los Agents que las llevaron a
      cabo.
    
    areas:
      - id: identificacion
        nombre: Identificación
        elementos:
          - id: "rico:name"
            clave: name
            nombre: Nombre de la actividad
            tipo: texto
            obligatorio: true
            multiple: false
            extraible: si
            instruccion: |
              Denominación de la función o actividad. Si tiene un nombre
              oficial, úsalo. Si no, descríbela en una frase corta.
          
          - id: "rico:hasActivityType"
            clave: activity_type
            nombre: Tipo de actividad
            tipo: texto
            obligatorio: false
            multiple: false
            extraible: si
            instruccion: |
              Categoría de la actividad: 'función administrativa',
              'proceso de negocio', 'evento singular', 'función jurídica',
              etc.
      
      - id: temporalidad
        nombre: Temporalidad
        elementos:
          - id: "rico:hasBeginningDate"
            clave: beginning_date
            nombre: Fecha de inicio
            tipo: texto
            obligatorio: false
            multiple: false
            extraible: si
            instruccion: |
              Fecha en que comenzó la actividad. Formato ISO 8601.
          
          - id: "rico:hasEndDate"
            clave: end_date
            nombre: Fecha de fin
            tipo: texto
            obligatorio: false
            multiple: false
            extraible: si
            instruccion: |
              Fecha en que terminó la actividad. Formato ISO 8601.
      
      - id: descripcion
        nombre: Descripción
        elementos:
          - id: "rico:descriptiveNote"
            clave: descriptive_note
            nombre: Descripción
            tipo: texto
            obligatorio: true
            multiple: false
            extraible: si
            instruccion: |
              Resumen de en qué consiste la actividad: objetivos,
              procedimiento, agentes que participan, periodo de
              vigencia. 3-5 frases.
