# =============================================================================
# Esquema ISDIAH para PlumA
# -----------------------------------------------------------------------------
# Norma Internacional para Describir Instituciones que Custodian Fondos
# de Archivo, 1ª ed., CIA, 2008. 33 elementos en 6 áreas.
#
# Caso de uso típico: el archivero sube documentación institucional del
# propio archivo (memoria anual, plan estratégico, guía del centro,
# estatutos) para generar un esbozo de ISDIAH. El asistente extrae lo
# deducible y deja el resto para revisión manual; los campos puramente
# operativos (horarios, contacto, accesibilidad) suelen ser manuales.
# =============================================================================

norma: ISDIAH
version: "1.0"
nombre: Norma Internacional para Describir Instituciones que Custodian Fondos de Archivo
idioma: es

areas:

  # ---------------------------------------------------------------------------
  - id: identificacion
    nombre: Área de identificación
    elementos:

      - id: "5.1.1"
        clave: identificador
        nombre: Identificador
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: parcial
        instruccion: |
          Código normalizado de la institución archivística según la
          ISO 15511 (ISIL) si aparece en el documento. Formato típico:
          "ES-AGA", "ES-AHN", etc. Si no figura, deja vacío.
        eac: "eag:repositorid"

      - id: "5.1.2"
        clave: forma_autorizada
        nombre: Forma(s) autorizada(s) del nombre
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: si
        instruccion: |
          Nombre oficial completo de la institución, sin abreviaturas,
          tal y como aparece en su documentación oficial (membretes,
          sellos, encabezamientos).
        eac: "autform"

      - id: "5.1.3"
        clave: formas_paralelas
        nombre: Forma(s) paralela(s) del nombre
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Versiones del nombre en otras lenguas oficiales si aparecen
          literalmente. No traduzcas.
        eac: "parform"

      - id: "5.1.4"
        clave: otras_formas
        nombre: Otra(s) forma(s) del nombre
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Siglas, acrónimos, denominaciones históricas o formas
          coloquiales presentes en el documento.
        eac: "nonpreform"

      - id: "5.1.5"
        clave: tipo_institucion
        nombre: Tipo de institución que custodia los fondos de archivo
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: si
        instruccion: |
          Naturaleza de la institución: archivo nacional, archivo
          autonómico, archivo provincial, archivo municipal, archivo
          eclesiástico, archivo universitario, archivo de empresa,
          archivo privado, biblioteca con fondo archivístico, etc.
        eac: "repositoryType"

  # ---------------------------------------------------------------------------
  - id: contacto
    nombre: Área de contacto
    elementos:

      - id: "5.2.1"
        clave: localizacion_direccion
        nombre: Localización y dirección(es)
        tipo: texto
        obligatorio: true
        multiple: true
        extraible: parcial
        instruccion: |
          Dirección postal completa: vía, número, código postal,
          municipio, provincia, país. Tal como aparezca en el documento.
        eac: "address"

      - id: "5.2.2"
        clave: telefono_email
        nombre: Teléfono, fax y correo electrónico
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Datos de contacto que aparezcan literalmente en el documento.
          Etiqueta cada uno: "Tel.:", "Fax:", "E-mail:".
        eac: "telephone, fax, email"

      - id: "5.2.3"
        clave: personas_contacto
        nombre: Personas de contacto
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Nombres y cargos del personal de contacto si aparecen en el
          documento (director/a, responsable de referencia, etc.).
        eac: "contact"

  # ---------------------------------------------------------------------------
  - id: descripcion
    nombre: Área de descripción
    elementos:

      - id: "5.3.1"
        clave: historia
        nombre: Historia de la institución que custodia los fondos
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Reseña histórica de la institución (máx. 200 palabras):
          fundación, hitos, cambios de denominación o sede, base
          normativa. Solo a partir de información presente en el
          documento. Si añades algo de conocimiento general, márcalo
          como "[contexto añadido]".
        eac: "history"

      - id: "5.3.2"
        clave: contexto_geografico_cultural
        nombre: Contexto geográfico y cultural
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        eac: "geogContext"

      - id: "5.3.3"
        clave: atribuciones_fuentes_legales
        nombre: Atribuciones / Fuentes legales
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Normativa que regula la creación, las funciones y las
          competencias del archivo, citada literalmente en el documento.
          Una entrada por norma.
        eac: "mandate"

      - id: "5.3.4"
        clave: estructura_administrativa
        nombre: Estructura administrativa
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Organigrama o estructura interna del archivo si se describe
          en el documento (secciones, departamentos, unidades).
        eac: "structure"

      - id: "5.3.5"
        clave: gestion_documentos_ingresos
        nombre: Gestión de documentos y política de ingresos
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Criterios y procedimientos del archivo para el ingreso,
          tratamiento y conservación de fondos. Solo si están
          documentados en el material procesado.
        eac: "holdings"

      - id: "5.3.6"
        clave: edificios
        nombre: Edificio(s)
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Información sobre las sedes: características arquitectónicas
          relevantes, capacidad de depósito, instalaciones especiales.
          Solo si se menciona.
        eac: "buildings"

      - id: "5.3.7"
        clave: fondos_colecciones
        nombre: Fondos y otras colecciones custodiadas
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Resumen del patrimonio documental custodiado: fondos
          principales, volumen total, fechas extremas, materias
          predominantes. Solo a partir de cifras y descripciones
          presentes en el documento.
        eac: "holdings"

      - id: "5.3.8"
        clave: instrumentos_descripcion
        nombre: Instrumentos de descripción, guías y publicaciones
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Guías, inventarios, catálogos y publicaciones del archivo
          mencionados en el documento. Una entrada por instrumento.
        eac: "findaids, publications"

  # ---------------------------------------------------------------------------
  - id: acceso
    nombre: Área de acceso
    elementos:

      - id: "5.4.1"
        clave: horarios
        nombre: Horarios de apertura
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Horario de atención al público y periodos de cierre, tal y
          como aparezcan en el documento.
        eac: "openinghours"

      - id: "5.4.2"
        clave: condiciones_uso
        nombre: Condiciones y requisitos para el uso y el acceso
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Requisitos para acceder al archivo: identificación, carné de
          investigador, restricciones temáticas, plazos de reserva, etc.
        eac: "conditions"

      - id: "5.4.3"
        clave: accesibilidad
        nombre: Accesibilidad
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Información sobre accesibilidad física (transporte, rampas,
          ascensores) y para personas con discapacidad.
        eac: "accessibility"

  # ---------------------------------------------------------------------------
  - id: servicios
    nombre: Área de servicios
    elementos:

      - id: "5.5.1"
        clave: servicios_ayuda_investigacion
        nombre: Servicios de ayuda a la investigación
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Servicios de referencia, consulta, orientación, formación al
          usuario, etc. Solo si se mencionan.
        eac: "researchservices"

      - id: "5.5.2"
        clave: servicios_reproduccion
        nombre: Servicios de reproducción
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Reprografía, digitalización a demanda, microfilm: tarifas,
          plazos y condiciones si aparecen en el documento.
        eac: "reproductionservices"

      - id: "5.5.3"
        clave: espacios_publicos
        nombre: Espacios públicos
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Sala de investigadores, sala de exposiciones, biblioteca
          auxiliar, salón de actos, cafetería, etc.
        eac: "publicareas"

  # ---------------------------------------------------------------------------
  - id: control
    nombre: Área de control
    elementos:

      - id: "5.6.1"
        clave: identificador_descripcion
        nombre: Identificador de la descripción
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: no
        valor_por_defecto: auto
        instruccion: null
        eac: "control/recordId"

      - id: "5.6.2"
        clave: identificador_institucion
        nombre: Identificador de la institución (responsable del registro)
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        eac: "control/otherRecordId"

      - id: "5.6.3"
        clave: reglas_convenciones
        nombre: Reglas y/o convenciones
        tipo: texto
        obligatorio: true
        multiple: true
        extraible: no
        valor_por_defecto: "ISDIAH, 1ª ed., 2008"
        instruccion: null
        eac: "control/conventionDeclaration"

      - id: "5.6.4"
        clave: estado_elaboracion
        nombre: Estado de elaboración
        tipo: lista
        obligatorio: true
        multiple: false
        extraible: no
        valores:
          - borrador
          - finalizado
          - revisado
        valor_por_defecto: borrador
        instruccion: null
        eac: "control/maintenanceStatus"

      - id: "5.6.5"
        clave: nivel_detalle
        nombre: Nivel de detalle
        tipo: lista
        obligatorio: false
        multiple: false
        extraible: no
        valores:
          - minimo
          - parcial
          - completo
        instruccion: null
        eac: "control/publicationStatus"

      - id: "5.6.6"
        clave: fechas_descripcion
        nombre: Fechas de creación, revisión o eliminación
        tipo: fecha
        obligatorio: true
        multiple: true
        extraible: no
        valor_por_defecto: auto
        instruccion: null
        eac: "control/maintenanceHistory/maintenanceEvent/eventDateTime"

      - id: "5.6.7"
        clave: lenguas_escrituras
        nombre: Lengua(s) y escritura(s)
        tipo: lista
        obligatorio: true
        multiple: true
        extraible: no
        valor_por_defecto: ["spa"]
        instruccion: null
        eac: "control/languageDeclaration"

      - id: "5.6.8"
        clave: fuentes
        nombre: Fuentes
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: si
        instruccion: |
          Cita el documento procesado como fuente del registro: tipo,
          fecha y referencia. Una entrada por fuente.
        eac: "control/sources"

      - id: "5.6.9"
        clave: notas_mantenimiento
        nombre: Notas de mantenimiento
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        eac: "control/maintenanceHistory/maintenanceEvent/eventDescription"
