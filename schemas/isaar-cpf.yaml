# =============================================================================
# Esquema ISAAR(CPF) para PlumA
# -----------------------------------------------------------------------------
# Norma Internacional sobre Registros de Autoridad Archivísticos relativos a
# Instituciones, Personas y Familias, 2ª ed., CIA, 2004.
# 27 elementos agrupados en 4 áreas.
#
# Caso de uso típico en este asistente: el archivero ha identificado un
# productor en una descripción ISAD(G) y necesita generar un esbozo de
# registro de autoridad. El asistente extrae lo deducible del/de los
# documento(s) procesado(s) y deja el resto para revisión manual.
# Mapeo XML: EAC-CPF (Encoded Archival Context).
# =============================================================================

norma: ISAAR(CPF)
version: "2.0"
nombre: Norma Internacional sobre Registros de Autoridad Archivísticos
idioma: es

areas:

  # ---------------------------------------------------------------------------
  - id: identificacion
    nombre: Área de identificación
    elementos:

      - id: "5.1.1"
        clave: tipo_entidad
        nombre: Tipo de entidad
        tipo: lista
        obligatorio: true
        multiple: false
        extraible: si
        valores:
          - persona
          - familia
          - institucion
        instruccion: |
          Determina si la entidad descrita es una persona física, una
          familia o una institución (corporación, organismo público,
          empresa). Búscalo a partir del contexto: firmas, sellos,
          membretes, fórmulas de tratamiento.
        eac: "entityType"

      - id: "5.1.2"
        clave: forma_autorizada
        nombre: Forma(s) autorizada(s) del nombre
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: si
        instruccion: |
          Forma normalizada y preferente del nombre. Para personas:
          "Apellidos, Nombre (fechas)" si se conocen. Para instituciones:
          nombre completo oficial sin abreviaturas. Para familias:
          "Familia Apellido (lugar, fechas)". Si hay variantes en el
          documento, elige la más completa y formal.
        eac: "nameEntry/part"

      - id: "5.1.3"
        clave: formas_paralelas
        nombre: Forma(s) paralela(s) del nombre
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Equivalentes del nombre en otras lenguas. Solo inclúyelos si
          aparecen literalmente en el documento (p. ej. instituciones
          con nombre oficial bilingüe). No traduzcas.
        eac: "nameEntryParallel"

      - id: "5.1.4"
        clave: formas_otras_reglas
        nombre: Forma(s) normalizada(s) del nombre según otras reglas
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        eac: "nameEntry"

      - id: "5.1.5"
        clave: otras_formas
        nombre: Otra(s) forma(s) del nombre
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Variantes ortográficas, siglas, acrónimos, seudónimos, nombres
          anteriores o posteriores, formas latinizadas, etc. que aparezcan
          en el documento. Útil para recuperación en sistemas de
          búsqueda. No inventes variantes.
        eac: "nameEntry"

      - id: "5.1.6"
        clave: identificadores
        nombre: Identificadores para instituciones
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          NIF, CIF, código DIR3, ISNI, VIAF u otros identificadores
          institucionales o personales que aparezcan literalmente en
          el documento.
        eac: "entityId"

  # ---------------------------------------------------------------------------
  - id: descripcion
    nombre: Área de descripción
    elementos:

      - id: "5.2.1"
        clave: fechas_existencia
        nombre: Fechas de existencia
        tipo: fecha
        obligatorio: true
        multiple: false
        extraible: parcial
        instruccion: |
          Fechas de nacimiento/muerte (personas) o creación/extinción
          (instituciones, familias). Formato ISO 8601, rango si procede:
          YYYY/YYYY. Si solo se conoce una, deja la otra abierta:
          1923/.. o ../1976. Si la fecha es aproximada, antepón [ca. ].
          Solo cumplimenta si hay evidencia explícita en el documento.
        eac: "existDates"

      - id: "5.2.2"
        clave: historia
        nombre: Historia
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Reseña biográfica o historia institucional (máx. 200 palabras)
          basada SOLO en información presente en el documento procesado.
          Hechos significativos en orden cronológico. No completes con
          conocimiento general; si lo haces excepcionalmente, márcalo
          como "[contexto añadido]".
        eac: "biogHist"

      - id: "5.2.3"
        clave: lugares
        nombre: Lugares
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Lugares vinculados a la entidad: nacimiento, residencia,
          actividad, sede, jurisdicción. Forma normalizada cuando sea
          posible (topónimo actual + histórico entre paréntesis si
          difiere). Solo los que aparezcan en el documento.
        eac: "place"

      - id: "5.2.4"
        clave: estatuto_juridico
        nombre: Estatuto jurídico
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: parcial
        instruccion: |
          Naturaleza jurídica de instituciones (organismo público,
          fundación, sociedad mercantil, asociación, etc.) o estatuto
          personal relevante (clero, militar, nobleza, etc.). Solo si
          se desprende del documento.
        eac: "legalStatus"

      - id: "5.2.5"
        clave: funciones_actividades
        nombre: Funciones, ocupaciones y actividades
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Funciones, profesiones, oficios o actividades que la entidad
          desarrollaba. Una entrada por función diferenciada. Útil para
          enlazar con descripciones ISDF.
        eac: "function"

      - id: "5.2.6"
        clave: atribuciones_fuentes
        nombre: Atribuciones / Fuentes legales
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        eac: "mandate"

      - id: "5.2.7"
        clave: estructura_genealogia
        nombre: Estructura interna / Genealogía
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        eac: "structureOrGenealogy"

      - id: "5.2.8"
        clave: contexto_general
        nombre: Contexto general
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        eac: "generalContext"

  # ---------------------------------------------------------------------------
  - id: relaciones
    nombre: Área de relaciones
    elementos:

      - id: "5.3.1"
        clave: entidades_relacionadas
        nombre: Nombres / Identificadores de entidades relacionadas
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: parcial
        instruccion: |
          Otras personas, familias o instituciones explícitamente
          mencionadas en el documento como vinculadas a la entidad
          principal (jefes, subordinados, predecesores, sucesores,
          cónyuges, filiales, organismos matrices). Solo extracción
          textual, no infieras relaciones no declaradas.
        eac: "cpfRelation"

      - id: "5.3.2"
        clave: naturaleza_relacion
        nombre: Naturaleza de la relación
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        eac: "cpfRelation/@cpfRelationType"

      - id: "5.3.3"
        clave: descripcion_relacion
        nombre: Descripción de la relación
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        eac: "cpfRelation/descriptiveNote"

      - id: "5.3.4"
        clave: fechas_relacion
        nombre: Fechas de la relación
        tipo: fecha
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        eac: "cpfRelation/dateRange"

  # ---------------------------------------------------------------------------
  - id: control
    nombre: Área de control
    elementos:

      - id: "5.4.1"
        clave: identificador_registro
        nombre: Identificador del registro de autoridad
        tipo: texto
        obligatorio: true
        multiple: false
        extraible: no
        valor_por_defecto: auto  # UUID generado por el sistema
        instruccion: null
        eac: "control/recordId"

      - id: "5.4.2"
        clave: identificadores_institucion
        nombre: Identificadores de la institución (responsable del registro)
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: no
        instruccion: null
        eac: "control/otherRecordId"

      - id: "5.4.3"
        clave: reglas_convenciones
        nombre: Reglas y/o convenciones
        tipo: texto
        obligatorio: true
        multiple: true
        extraible: no
        valor_por_defecto: "ISAAR(CPF), 2ª ed., 2004"
        instruccion: null
        eac: "control/conventionDeclaration"

      - id: "5.4.4"
        clave: estado_elaboracion
        nombre: Estado de elaboración
        tipo: lista
        obligatorio: true
        multiple: false
        extraible: no
        valores:
          - borrador
          - finalizado
          - revisado
        valor_por_defecto: borrador
        instruccion: null
        eac: "control/maintenanceStatus"

      - id: "5.4.5"
        clave: nivel_detalle
        nombre: Nivel de detalle
        tipo: lista
        obligatorio: false
        multiple: false
        extraible: no
        valores:
          - minimo
          - parcial
          - completo
        instruccion: null
        eac: "control/publicationStatus"

      - id: "5.4.6"
        clave: fechas_descripcion
        nombre: Fechas de creación, revisión o eliminación
        tipo: fecha
        obligatorio: true
        multiple: true
        extraible: no
        valor_por_defecto: auto
        instruccion: null
        eac: "control/maintenanceHistory/maintenanceEvent/eventDateTime"

      - id: "5.4.7"
        clave: lenguas_escrituras
        nombre: Lengua(s) y escritura(s) del registro
        tipo: lista
        obligatorio: true
        multiple: true
        extraible: no
        valor_por_defecto: ["spa"]
        instruccion: null
        eac: "control/languageDeclaration"

      - id: "5.4.8"
        clave: fuentes
        nombre: Fuentes
        tipo: texto
        obligatorio: false
        multiple: true
        extraible: si
        instruccion: |
          Cita el documento procesado como fuente del registro: tipo
          documental, fecha y signatura si la hay. Ejemplo: "Acta de la
          sesión plenaria de 12 de marzo de 1923 (sig. 1923/45)". Si se
          han usado varios documentos, una entrada por fuente.
        eac: "control/sources"

      - id: "5.4.9"
        clave: notas_mantenimiento
        nombre: Notas de mantenimiento
        tipo: texto
        obligatorio: false
        multiple: false
        extraible: no
        instruccion: null
        eac: "control/maintenanceHistory/maintenanceEvent/eventDescription"
