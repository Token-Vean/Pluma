name: security-checks

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pip-audit

      - name: Lint with Ruff
        working-directory: backend
        run: ruff check app ../tests

      - name: Run tests
        working-directory: backend
        env:
          USAR_SANDBOX_PARSERS: "false"
        run: pytest ../tests -q

      - name: Audit Python dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt

  docker-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build application image
        run: docker build -t pluma-app:ci ./backend

      - name: Scan image with Trivy container
        run: |
          docker run --rm             -v /var/run/docker.sock:/var/run/docker.sock             -v "$HOME/.cache/trivy:/root/.cache"             aquasec/trivy:0.69.3             image --exit-code 1 --ignore-unfixed --severity CRITICAL,HIGH pluma-app:ci

      - name: Check release package does not include .env
        run: |
          if find . -name .env -print -quit | grep -q .; then
            echo "ERROR: .env no debe estar en el repositorio ni en el paquete de release"
            exit 1
          fi
