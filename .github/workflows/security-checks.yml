name: security-checks

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit pytest pyyaml
      - name: Static repository security checks
        run: python scripts/security_static_check.py
      - name: Bandit static analysis
        run: bandit -r backend/app -ll
      - name: pip-audit dependencies
        run: pip-audit -r backend/requirements.txt
      - name: Unit tests
        env:
          PYTHONPATH: backend
        run: pytest -q

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript, python
      - uses: github/codeql-action/analyze@v4

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build local image
        run: docker compose build app
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'pluma-app:0.4.16-alpha'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
